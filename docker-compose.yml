services:

  postgres:
    image: postgres:15-alpine
    container_name: smartorder-postgres
    environment:
      POSTGRES_DB: smartorder
      POSTGRES_USER: smartorder
      POSTGRES_PASSWORD: smartorder
    ports:
      - "5432:5432"
    volumes:
      - smartorder_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartorder"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smartorder-app
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/smartorder
      SPRING_DATASOURCE_USERNAME: smartorder
      SPRING_DATASOURCE_PASSWORD: smartorder
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  smartorder_postgres_data:
